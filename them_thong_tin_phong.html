<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Thêm thông tin phòng</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap"

            border-color: #177fe8;
        }

            color: #177fe8;
        }

            right: 0;
            border-color: #177fe8;
        }

            background-color: #177fe8;
        }

<body class="bg-background-light dark:bg-background-dark font-display text-gray-700 dark:text-gray-200 antialiased selection:bg-primary/20 selection:text-primary transition-colors duration-200">
<form method="POST" enctype="multipart/form-data" action="">
    <nav class="bg-surface-light dark:bg-surface-dark border-b border-gray-200 dark:border-gray-700 px-6 py-3 sticky top-0 z-30">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="#" class="text-gray-500 hover:text-primary transition-colors">
                    <span class="material-icons">arrow_back</span>
                </a>
                <div class="flex flex-col">
                    <h1 class="text-xl font-semibold text-gray-900 dark:text-white">
                        Thêm thông tin phòng
                    </h1>
                    <span class="text-xs text-gray-500 dark:text-gray-400">Danh sách phòng / Thêm phòng</span>
                </div>
            </div>
            <div class="inline-flex items-center bg-gray-100 dark:bg-gray-800 p-1 rounded-lg border border-gray-200 dark:border-gray-700">

                    <input type="radio" name="status" value="available" class="peer sr-only">
                    <div class="py-1.5 px-2 rounded-md text-sm font-medium text-gray-500 dark:text-gray-400 peer-checked:bg-white dark:peer-checked:bg-gray-700 peer-checked:text-gray-900 dark:peer-checked:text-white peer-checked:shadow-sm transition-all flex items-center justify-center">
                        Trống
                    </div>
                </label>
                <label class="cursor-pointer relative m-0 flex-1 sm:w-28">
                    <input type="radio" name="status" value="rented" class="peer sr-only" checked>
                    <div class="py-1.5 px-2 rounded-md text-sm font-medium text-gray-500 dark:text-gray-400 peer-checked:bg-white dark:peer-checked:bg-gray-700 peer-checked:text-gray-900 dark:peer-checked:text-white peer-checked:shadow-sm transition-all flex items-center justify-center">
                        Đang thuê
                    </div>
                </label>
                <label class="cursor-pointer relative m-0 flex-1 sm:w-28">
                    <input type="radio" name="status" value="maintenance" class="peer sr-only">
                    <div class="py-1.5 px-2 rounded-md text-sm font-medium text-gray-500 dark:text-gray-400 peer-checked:bg-white dark:peer-checked:bg-gray-700 peer-checked:text-gray-900 dark:peer-checked:text-white peer-checked:shadow-sm transition-all flex items-center justify-center">
                        Sửa chữa
                    </div>
                </label>
            </div>
        </div>
    </nav>
    <main class="max-w-5xl mx-auto p-6">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-7 space-y-6">
                <section class="bg-surface-light dark:bg-surface-dark rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden">
                    <div class="px-6 py-4 border-b border-gray-100 dark:border-gray-700 flex justify-between items-center bg-gray-50/50 dark:bg-gray-800/50">
                        <div class="flex items-center gap-2">
                            <h2 class="text-lg font-semibold text-gray-900 dark:text-white">Thông tin cơ bản</h2>
                        </div>
                    </div>
                    <div class="p-6 grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div class="col-span-1">
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Tên phòng</label>
                            <input class="w-full rounded-lg border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-white shadow-sm focus:border-primary focus:ring-primary sm:text-sm py-2.5"
                                   type="text" placeholder="VD: 101" name="name" value="101" required/>
                        </div>
                        <div class="col-span-1">
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Tầng</label>
                            <div class="relative">
                                <input class="w-full rounded-lg border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-white shadow-sm focus:border-primary focus:ring-primary sm:text-sm py-2.5 appearance-none"
                                       placeholder="VD: 1" name="floor" value="1" required/>
                            </div>
                        </div>
                        <div class="col-span-1">
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Diện tích (m²)</label>
                            <div class="relative rounded-md shadow-sm">
                                <input class="block w-full rounded-lg border-gray-300 dark:border-gray-600 pl-3 pr-10 focus:border-primary focus:ring-primary sm:text-sm py-2.5 bg-white dark:bg-gray-800 dark:text-white"
                                       placeholder="VD: 25" name="area" value="25" required/>
                                <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none">
                                    <span class="text-gray-500 sm:text-sm">m²</span>
                                </div>
                            </div>
                        </div>
                        <div class="col-span-1">
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Số người tối đa</label>
                            <div class="flex items-center border border-gray-300 dark:border-gray-600 rounded-lg overflow-hidden w-full">
                                <button type="button" class="px-3 py-2 bg-gray-50 dark:bg-gray-700 hover:bg-gray-100 dark:hover:bg-gray-600 border-r border-gray-300 dark:border-gray-600 text-gray-500 transition-colors">
                                    <span class="material-icons text-sm">remove</span>
                                </button>
                                <input class="w-full text-center border-none focus:ring-0 p-2 bg-white dark:bg-gray-800 dark:text-white text-sm [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none"
                                       type="number" value="2" min="1" name="max_occupancy" required/>
                                <button type="button" class="px-3 py-2 bg-gray-50 dark:bg-gray-700 hover:bg-gray-100 dark:hover:bg-gray-600 border-l border-gray-300 dark:border-gray-600 text-gray-500 transition-colors">
                                    <span class="material-icons text-sm">add</span>
                                </button>
                            </div>
                        </div>
                        <div class="col-span-1 sm:col-span-2">
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Giá thuê (Tháng)</label>
                            <div class="relative rounded-md shadow-sm">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <span class="text-gray-500 sm:text-sm">₫</span>
                                </div>
                                <input class="block w-full rounded-lg border-gray-300 dark:border-gray-600 pl-7 pr-12 focus:border-primary focus:ring-primary sm:text-sm py-2.5 font-semibold text-gray-900 dark:text-white bg-white dark:bg-gray-800"
                                       placeholder="VD: 4.500.000" type="text" name="base_rent" value="3.500.000" required/>
                                <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none">
                                    <span class="text-gray-500 sm:text-sm">VNĐ</span>
                                </div>
                            </div>
                        </div>
                        <div class="col-span-1 sm:col-span-2 pt-2 border-t border-gray-100 dark:border-gray-700">
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-3">Tiện nghi phòng</label>
                            <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                                <label class="inline-flex items-center space-x-2 cursor-pointer group">
                                    <input class="form-checkbox rounded text-primary border-gray-300 focus:ring-primary h-4 w-4"
                                           type="checkbox" name="air_conditioner" checked/>
                                    <span class="text-sm text-gray-600 dark:text-gray-400 group-hover:text-gray-900 dark:group-hover:text-gray-200">Máy lạnh</span>
                                </label>
                                <label class="inline-flex items-center space-x-2 cursor-pointer group">
                                    <input class="form-checkbox rounded text-primary border-gray-300 focus:ring-primary h-4 w-4"
                                           type="checkbox" name="water_heater" checked/>
                                    <span class="text-sm text-gray-600 dark:text-gray-400 group-hover:text-gray-900 dark:group-hover:text-gray-200">Máy nước nóng</span>
                                </label>
                                <label class="inline-flex items-center space-x-2 cursor-pointer group">
                                    <input class="form-checkbox rounded text-primary border-gray-300 focus:ring-primary h-4 w-4"
                                           type="checkbox" name="refrigerator"/>
                                    <span class="text-sm text-gray-600 dark:text-gray-400 group-hover:text-gray-900 dark:group-hover:text-gray-200">Tủ lạnh</span>
                                </label>
                                <label class="inline-flex items-center space-x-2 cursor-pointer group">
                                    <input class="form-checkbox rounded text-primary border-gray-300 focus:ring-primary h-4 w-4"
                                           type="checkbox" name="furniture" checked/>
                                    <span class="text-sm text-gray-600 dark:text-gray-400 group-hover:text-gray-900 dark:group-hover:text-gray-200">Giường / Tủ</span>
                                </label>
                                <label class="inline-flex items-center space-x-2 cursor-pointer group">
                                    <input class="form-checkbox rounded text-primary border-gray-300 focus:ring-primary h-4 w-4"
                                           type="checkbox" name="balcony"/>
                                    <span class="text-sm text-gray-600 dark:text-gray-400 group-hover:text-gray-900 dark:group-hover:text-gray-200">Ban công</span>
                                </label>
                            </div>
                        </div>
                    </div>
                </section>
                <section class="bg-surface-light dark:bg-surface-dark rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden">
                    <div class="px-6 py-4 border-b border-gray-100 dark:border-gray-700 flex justify-between items-center bg-gray-50/50 dark:bg-gray-800/50">
                        <div class="flex items-center gap-2">
                            <h2 class="text-lg font-semibold text-gray-900 dark:text-white">Đơn giá & Chỉ số dịch vụ</h2>
                        </div>
                    </div>
                    <div class="p-6 grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div class="bg-primary/5 p-4 rounded-lg border border-primary/10">
                            <div class="flex items-center justify-between mb-2">
                                <label class="text-sm font-semibold text-gray-800 dark:text-gray-200 flex items-center gap-1">Đơn giá điện</label>
                            </div>
                            <div class="relative rounded-md shadow-sm">
                                <input class="block w-full rounded-md border-gray-300 dark:border-gray-600 pl-3 pr-16 focus:border-primary focus:ring-primary sm:text-sm py-2 text-left placeholder:text-xs bg-white dark:bg-gray-800 dark:text-white"
                                       type="text" placeholder="VD: 3.900" name="electricity_price" value="3.900" required/>
                                <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none">
                                    <span class="text-gray-500 text-xs">đ/kWh</span>
                                </div>
                            </div>
                        </div>
                        <div class="bg-primary/5 p-4 rounded-lg border border-primary/10">
                            <div class="flex items-center justify-between mb-2">
                                <label class="text-sm font-semibold text-gray-800 dark:text-gray-200 flex items-center gap-1">Đơn giá nước</label>
                            </div>
                            <div class="relative rounded-md shadow-sm">
                                <input class="block w-full rounded-md border-gray-300 dark:border-gray-600 pl-3 pr-12 focus:border-primary focus:ring-primary sm:text-sm py-2 text-left placeholder:text-xs bg-white dark:bg-gray-800 dark:text-white"
                                       type="text" placeholder="VD: 6.810" name="water_price" value="6.810" required/>
                                <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none">
                                    <span class="text-gray-500 text-xs">đ/m³</span>
                                </div>
                            </div>
                        </div>
                        <div class="bg-gray-50 dark:bg-gray-800/50 p-4 rounded-lg border border-gray-200 dark:border-gray-700">
                            <div class="flex items-center justify-between mb-2">
                                <label class="text-sm font-semibold text-gray-800 dark:text-gray-200 flex items-center gap-1">Chỉ số điện đầu</label>
                            </div>
                            <div class="relative rounded-md shadow-sm">
                                <input class="block w-full rounded-md border-gray-300 dark:border-gray-600 pl-3 pr-12 focus:border-primary focus:ring-primary sm:text-sm py-2 text-left placeholder:text-xs bg-white dark:bg-gray-800 dark:text-white"
                                       type="text" placeholder="Ví dụ: 1250" name="current_electricity" value="1250"/>
                                <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none">
                                    <span class="text-gray-500 text-xs">kWh</span>
                                </div>
                            </div>
                        </div>
                        <div class="bg-gray-50 dark:bg-gray-800/50 p-4 rounded-lg border border-gray-200 dark:border-gray-700">
                            <div class="flex items-center justify-between mb-2">
                                <label class="text-sm font-semibold text-gray-800 dark:text-gray-200 flex items-center gap-1">Chỉ số nước đầu</label>
                            </div>
                            <div class="relative rounded-md shadow-sm">
                                <input class="block w-full rounded-md border-gray-300 dark:border-gray-600 pl-3 pr-12 focus:border-primary focus:ring-primary sm:text-sm py-2 text-left placeholder:text-xs bg-white dark:bg-gray-800 dark:text-white"
                                       type="text" placeholder="Ví dụ: 120" name="current_water" value="120"/>
                                <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none">
                                    <span class="text-gray-500 text-xs">Khối</span>
                                </div>
                            </div>
                        </div>
                        <div class="bg-gray-50 dark:bg-gray-800/50 p-4 rounded-lg border border-gray-200 dark:border-gray-700">
                            <div class="flex items-center justify-between mb-2">
                                <label class="text-sm font-semibold text-gray-800 dark:text-gray-200 flex items-center gap-1">Rác</label>
                            </div>
                            <div class="relative rounded-md shadow-sm">
                                <input class="block w-full rounded-md border-gray-300 dark:border-gray-600 pl-3 pr-16 focus:border-primary focus:ring-primary sm:text-sm py-2 text-left placeholder:text-xs bg-white dark:bg-gray-800 dark:text-white"
                                       type="text" placeholder="VD: 50.000" name="trash_price" value="50.000" required/>
                                <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none">
                                    <span class="text-gray-500 text-xs">đ/phòng</span>
                                </div>
                            </div>
                        </div>
                        <div class="bg-gray-50 dark:bg-gray-800/50 p-4 rounded-lg border border-gray-200 dark:border-gray-700">
                            <div class="flex items-center justify-between mb-2">
                                <label class="text-sm font-semibold text-gray-800 dark:text-gray-200 flex items-center gap-1">Internet</label>
                            </div>
                            <div class="relative rounded-md shadow-sm">
                                <input class="block w-full rounded-md border-gray-300 dark:border-gray-600 pl-3 pr-16 focus:border-primary focus:ring-primary sm:text-sm py-2 text-left placeholder:text-xs bg-white dark:bg-gray-800 dark:text-white"
                                       type="text" placeholder="VD: 100.000" name="internet_price" value="100.000" required/>
                                <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none">
                                    <span class="text-gray-500 text-xs">đ/phòng</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
            <div class="lg:col-span-5 space-y-6">
                <section id="renter-section" class="bg-surface-light dark:bg-surface-dark rounded-xl shadow-lg border border-primary/20 h-full relative overflow-hidden transition-all duration-300">
                    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary to-blue-400"></div>
                    <div class="px-6 py-4 border-b border-gray-100 dark:border-gray-700 flex justify-between items-center bg-gray-50/50 dark:bg-gray-800/50">
                        <div class="flex items-center gap-2">
                            <h2 class="text-lg font-semibold text-gray-900 dark:text-white">Thông tin người thuê</h2>
                        </div>
                    </div>
                    <div class="p-6 space-y-5">
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Họ và tên</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <span class="material-icons text-gray-400 text-lg">person</span>
                                    </div>
                                    <select name="renter_id" class="pl-10 block w-full rounded-lg border-gray-300 dark:border-gray-600 focus:border-primary focus:ring-primary sm:text-sm py-2.5 bg-white dark:bg-gray-800 text-gray-900 dark:text-white appearance-none cursor-pointer" required>
                                        <option value="" disabled>-- Chọn người thuê --</option>
                                        <option value="1" selected>Nguyễn Văn Phúc</option>
                                        <option value="2">Trần Thị Linh</option>
                                    </select>
                                    <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                                        <span class="material-icons text-gray-400 text-lg">arrow_drop_down</span>
                                    </div>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Căn cước công dân</label>
                                    <input value="079099012345"
                                           class="block w-full rounded-lg border-gray-300 dark:border-gray-600 focus:border-primary focus:ring-primary sm:text-sm py-2.5 bg-white dark:bg-gray-800 dark:text-white"
                                           type="text" name="identify" required/>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Số điện thoại</label>
                                    <input value="0901234567"
                                           class="block w-full rounded-lg border-gray-300 dark:border-gray-600 focus:border-primary focus:ring-primary sm:text-sm py-2.5 bg-white dark:bg-gray-800 dark:text-white"
                                           type="tel" name="phone_number" required/>
                                </div>
                            </div>
                        </div>
                        <hr class="border-gray-100 dark:border-gray-700"/>
                        <div class="space-y-4">
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Ngày nhận phòng</label>
                                    <div class="relative">
                                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                            <span class="material-icons text-gray-400 text-lg">calendar_today</span>
                                        </div>
                                        <input value="2024-12-31"
                                               class="pl-10 block w-full rounded-lg border-gray-300 dark:border-gray-600 focus:border-primary focus:ring-primary sm:text-sm py-2.5 text-gray-900 dark:text-white bg-white dark:bg-gray-800"
                                               type="date" name="start_date" required/>
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Thời hạn thuê</label>
                                    <div class="relative">
                                        <input value="6"
                                               class="block w-full rounded-lg border-gray-300 dark:border-gray-600 focus:border-primary focus:ring-primary sm:text-sm py-2.5 pr-14 text-gray-900 dark:text-white bg-white dark:bg-gray-800"
                                               placeholder="VD: 3" name="duration" required/>
                                        <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none">
                                            <span class="text-gray-500 sm:text-sm">Tháng</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Tiền cọc</label>
                                <div class="relative rounded-md shadow-sm">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <span class="text-gray-500 sm:text-sm">₫</span>
                                    </div>
                                    <input value="3.500.000"
                                           class="block w-full rounded-lg border-gray-300 dark:border-gray-600 pl-7 pr-12 focus:border-primary focus:ring-primary sm:text-sm py-2.5 font-bold text-gray-900 dark:text-white bg-white dark:bg-gray-800"
                                           placeholder="VD: 4.500.000" type="text" name="deposit"/>
                                    <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none">
                                        <span class="text-gray-500 sm:text-sm">VNĐ</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="mt-4">
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Hình ảnh hợp đồng</label>
                            <div class="border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-xl p-4 bg-gray-50/30 dark:bg-gray-800/20">
                                <div id="file-name-preview" class="grid grid-cols-2 sm:grid-cols-3 gap-3 hidden mb-4">
                                    <div id="new-files-container" class="contents"></div>
                                </div>
                                <input type="file" id="document_file" name="document_file" accept="image/*,.pdf" class="hidden" multiple>
                                <label for="document_file" class="flex flex-col items-center justify-center py-6 cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-800/50 transition-colors rounded-lg group">
                                    <span class="material-icons text-gray-400 group-hover:text-primary transition-colors mb-1">add_a_photo</span>
                                    <span class="text-xs text-gray-500" id="file-label-text">Bấm vào đây để tải lên hoặc chọn thêm ảnh</span>
                                </label>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </div>
        <div class="mt-8 pt-6 border-t border-gray-200 dark:border-gray-700 flex items-center justify-end gap-4">
            <a href="#" type="button"
               class="px-6 py-2.5 border border-gray-300 dark:border-gray-600 rounded-lg text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">
                Hủy bỏ
            </a>
            <button type="submit"
                    class="px-6 py-2.5 bg-primary hover:bg-primary-hover text-white rounded-lg text-sm font-medium shadow-md shadow-primary/30 transition-all flex items-center gap-2">
                <span class="material-icons text-sm">save</span>
                Lưu thông tin
            </button>
        </div>

        <div id="image-modal" class="fixed inset-0 z-[100] hidden bg-black/90 backdrop-blur-sm flex items-center justify-center p-4 cursor-zoom-out">
            <button class="absolute top-5 right-5 text-white/70 hover:text-white transition-colors">
                <span class="material-icons text-4xl">close</span>
            </button>
            <img id="modal-img" src="" class="max-w-full max-h-full object-contain rounded-lg shadow-2xl transition-transform duration-300 zoom-in">
        </div>
    </main>
</form>
</body>
</html>
