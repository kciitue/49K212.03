<!DOCTYPE html>

<html class="light" lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Quên mật khẩu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap"
          rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
          rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#177fe8",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111921",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4">
<!-- Main Recovery Card -->
<div class="w-full max-w-md bg-white dark:bg-slate-900 shadow-xl rounded-xl overflow-hidden border border-primary/10 transition-all duration-300">
    <!-- Branding/Header Section -->
    <div class="p-8 text-center">
        <!-- Icon Container -->
        <div class="mb-6 inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary/10 dark:bg-primary/20">
            <span class="material-icons text-primary text-3xl">lock_reset</span>
        </div>
        <h1 class="text-2xl font-bold text-slate-900 dark:text-white mb-2 font-display">
            Quên mật khẩu?
        </h1>
        <p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed px-4">
            Nhập địa chỉ email, chúng tôi sẽ gửi đường dẫn đặt lại mật khẩu cho bạn.
        </p>
    </div>
    <!-- Form Section -->
    <div class="px-8 pb-8">
        <form class="space-y-6" method="POST">
            {% csrf_token %}
            <!-- Email Input Field -->
            <div>
                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2" for="email">
                    Email
                </label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <span class="material-icons text-slate-400">mail_outline</span>
                    </div>
                    <input type="email" name="email" id="email" required="" class="block w-full pl-10 pr-3 py-3 border border-slate-300 rounded-lg leading-5 bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-blue-600 sm:text-sm transition duration-150 ease-in-out"/>
                </div>
                {% if form.email.errors %}
                    <p class="text-red-500 text-sm mt-2 flex items-center">
                        <span class="material-icons text-sm mr-1">error</span>
                        {{ form.email.errors.0 }}
                    </p>
                {% endif %}
            </div>
            <!-- Action Button -->
            <button class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-3 px-6 rounded-lg shadow-lg shadow-primary/20 transition-all duration-200 flex items-center justify-center group"
                    type="submit">
                <span>Gửi yêu cầu</span>
                <span class="material-icons text-lg ml-2 group-hover:translate-x-1 transition-transform">send</span>
            </button>
        </form>
        <!-- Footer Navigation -->
        <div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800 text-center">
            <a class="inline-flex items-center text-sm font-medium text-primary hover:text-primary/80 transition-colors"
               href="{% url 'login' %}">
                <span class="material-icons text-lg mr-1">arrow_back</span>
                Quay lại Đăng nhập
            </a>
        </div>
    </div>
</div>
<!-- Decorative Background Elements -->
<div class="fixed top-0 left-0 w-full h-1 bg-primary"></div>
<div class="fixed -bottom-24 -left-24 w-64 h-64 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed -top-24 -right-24 w-64 h-64 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<!-- Background Pattern Image (Abstract) -->
<div class="hidden">
    <img alt="Background pattern" data-alt="Blue and white abstract gradient professional background"
         src="https://lh3.googleusercontent.com/aida-public/AB6AXuCbbAbXmS7muqkX46s79AEzzLWBYBddzJ10z5EbPRsM4zLK-LPj8hOd35IHyOJtFnOrTXmwHmlsg0TkWjzMNdJRlyITJ2W_5w8Rj-lna8TZ1awqxABRESa-STh6y4H_ICUdUWb4VwiOh0TfvhI9ZvVrh1AavuzoVTOL8eZaYPlOGkRk0z8bt0TPpQqlA4csJ-yf8Kv-gQtVLk-59mmjKmXUfzLUTfGIpdLU4FmLQURZnFrBGldVpQxumpQF0cwA4NEdKZ8W4cFcraz8"/>
</div>
</body>
</html>
