<!DOCTYPE html>

<html class="light" lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Đã gửi email</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap"
          rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
          rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#177fe8",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111921",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-4">
<!-- Main Container -->
<div class="max-w-md w-full bg-white dark:bg-slate-900 shadow-xl rounded-xl overflow-hidden border border-primary/10">
    <!-- Subtle Top Accented Border -->
    <div class="h-1.5 bg-primary w-full"></div>
    <div class="p-8 md:p-10 flex flex-col items-center text-center">
        <!-- Success/Envelope Icon Section -->
        <div class="mb-8 relative">
            <div class="w-24 h-24 bg-primary/10 dark:bg-primary/20 rounded-full flex items-center justify-center">
                <span class="material-icons-outlined text-primary text-5xl">mark_email_read</span>
            </div>
            <!-- Decorative Elements -->
            <div class="absolute -top-1 -right-1 w-6 h-6 bg-primary rounded-full border-4 border-white dark:border-slate-900 flex items-center justify-center">
                <span class="material-icons-outlined text-white text-[12px] font-bold">check</span>
            </div>
        </div>
        <!-- Content Section -->
        <h1 class="text-2xl md:text-3xl font-bold text-slate-800 dark:text-white mb-4">
            Đã gửi email!
        </h1>
        <p class="text-slate-600 dark:text-slate-400 leading-relaxed mb-10">
            Chúng tôi đã gửi hướng dẫn đặt lại mật khẩu đến email của bạn. Vui lòng kiểm tra hộp thư
        </p>
        <!-- Action Buttons -->
        <div class="w-full space-y-4">
            <a href="https://mail.google.com" target="_blank" class="w-full py-3 px-6 bg-primary hover:bg-primary/90 text-white font-semibold rounded-lg transition-colors duration-200 shadow-md shadow-primary/20">
                Mở ứng dụng email
            </a>
            <div class="pt-4">
                <a class="inline-flex items-center text-primary hover:text-primary/80 font-medium transition-all group"
                   href="{% url 'login' %}">
                    <span class="material-icons-outlined text-sm mr-2 group-hover:-translate-x-1 transition-transform">arrow_back</span>
                    Quay về Đăng nhập
                </a>
            </div>
        </div>
        <!-- Resend Link -->
        <div class="mt-12 pt-8 border-t border-slate-100 dark:border-slate-800 w-full">
            <p class="text-sm text-slate-500 dark:text-slate-500">
                Chưa nhận được email?
                <a href="{% url 'require_set_password_again' %}" class="text-primary font-semibold hover:underline ml-1">Thử lại</a>
            </p>
        </div>
    </div>
</div>
<!-- Background Decoration (Optional for visual appeal) -->
<div class="fixed top-0 left-0 w-full h-full -z-10 opacity-30 pointer-events-none overflow-hidden">
    <div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary/10 rounded-full blur-[100px]"></div>
    <div class="absolute bottom-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[100px]"></div>
</div>
</body>
</html>
