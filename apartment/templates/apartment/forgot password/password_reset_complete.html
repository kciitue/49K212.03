<!DOCTYPE html>

<html lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Đổi mật khẩu thành công</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
          rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#177fe8",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111921",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center font-display antialiased p-4">
<!-- Main Card Container -->
<div class="bg-white dark:bg-slate-800 w-full max-w-md rounded-2xl shadow-xl overflow-hidden relative border border-slate-100 dark:border-slate-700 p-8 md:p-10 text-center">
    <!-- Decorative Background Elements -->
    <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-primary/60 via-primary to-primary/60"></div>
    <!-- Success Icon -->
    <div class="mx-auto flex items-center justify-center w-20 h-20 rounded-full bg-green-100 dark:bg-green-900/30 mb-6">
        <span class="material-icons-round text-green-500 text-5xl animate-pulse">check_circle</span>
    </div>
    <!-- Header Content -->
    <h1 class="text-2xl font-bold text-slate-900 dark:text-white mb-3">
        Đổi mật khẩu thành công!
    </h1>
    <!-- Body Text -->
    <p class="text-slate-500 dark:text-slate-400 mb-8 leading-relaxed">
        Mật khẩu của bạn đã được cập nhật. <br/>Bạn có thể đăng nhập ngay bây giờ.
    </p>
    <!-- Action Button -->
    <a href="{% url 'login' %}" class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-3.5 px-6 rounded-lg transition duration-200 ease-in-out focus:ring-4 focus:ring-primary/20 focus:outline-none flex items-center justify-center group">
        <span>Đăng nhập ngay</span>
        <span class="material-icons-round ml-2 group-hover:translate-x-1 transition-transform text-lg">arrow_forward</span>
    </a>
    <!-- Optional Footer Link/Help -->
{#    <div class="mt-6 pt-6 border-t border-slate-100 dark:border-slate-700">#}
{#        <p class="text-sm text-slate-400 dark:text-slate-500">#}
{#            Cần hỗ trợ? <a class="text-primary hover:text-primary/80 font-medium transition-colors" href="#">Liên hệ#}
{#            Admin</a>#}
{#        </p>#}
{#    </div>#}
</div>
</body>
</html>
